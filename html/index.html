<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Operational Mobility Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --royal: #6C3BAA;
    --electric: #A66EFF;
    --white: #FFFFFF;
    --royal-dark: #4e2b7e;
    --royal-light: #8B52CC;
    --bg: #f5f0ff;
    --card-bg: #ffffff;
    --text-dark: #1a0a33;
    --text-mid: #4a3570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--royal-dark) 0%, var(--royal) 60%, var(--royal-light) 100%);
    padding: 28px 48px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  .header-title {
    font-family: 'Outfit', sans-serif;
    font-size: 2.1rem;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .header-title span {
    color: var(--electric);
  }

  /* Logo bar */
  .logo-bar {
    display: flex;
    align-items: center;
    gap: 28px;
    background: rgb(255 255 255 / 0.8);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: 12px 32px;
    border: 1px solid rgba(255,255,255,0.18);
    position: relative;
    z-index: 1;
  }
  .logo-bar img {
    height: 44px;
    width: auto;
    max-width: 130px;
    object-fit: contain;
    display: block;
    opacity: 0.92;
  }
  .logo-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  /* ── MAIN CONTENT ── */
  .content {
    padding: 40px 48px 60px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Outfit', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--electric);
    margin-bottom: 20px;
    margin-top: 44px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--electric) 0%, transparent 100%);
    opacity: 0.35;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .grid-2 { grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 22px 22px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    border: 1.5px solid rgba(108,59,170,0.1);
    box-shadow: 0 2px 16px rgba(108,59,170,0.06);
    transition: all 0.22s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--royal), var(--electric));
    opacity: 0;
    transition: opacity 0.22s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(108,59,170,0.16);
    border-color: rgba(166,110,255,0.35);
  }
  .card:hover::before { opacity: 1; }

  /* icon bubble */
  .icon-bubble {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--royal) 0%, var(--electric) 100%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(108,59,170,0.3);
  }
  .icon-bubble svg { width: 26px; height: 26px; }

  .card-body {}
  .card-num {
    font-family: 'Outfit', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--electric);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .card-title {
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.35;
  }

  /* ── CARD AS LINK ── */
  a.card {
    text-decoration: none;
    color: inherit;
  }
  .card-arrow {
    margin-left: auto;
    align-self: center;
    opacity: 0;
    transform: translateX(-6px);
    transition: all 0.22s ease;
    color: var(--electric);
    font-size: 1.2rem;
    flex-shrink: 0;
    padding-left: 8px;
  }
  a.card:hover .card-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── DASHBOARD SELECTOR (SLT / Mobitel) ── */
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
  }
  @media (max-width: 720px) {
    .dashboard-grid { grid-template-columns: 1fr; }
  }

  .dashboard-card {
    background: var(--card-bg);
    border-radius: 22px;
    padding: 56px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    border: 1.5px solid rgba(108,59,170,0.1);
    box-shadow: 0 2px 16px rgba(108,59,170,0.06);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .dashboard-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--royal), var(--electric));
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .dashboard-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 40px rgba(108,59,170,0.18);
    border-color: rgba(166,110,255,0.4);
  }
  .dashboard-card:hover::before { opacity: 1; }

  .dashboard-logo-placeholder {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(108,59,170,0.08), rgba(166,110,255,0.12));
    border: 1.5px dashed rgba(108,59,170,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s ease;
  }
  .dashboard-card:hover .dashboard-logo-placeholder {
    border-color: var(--electric);
    background: linear-gradient(135deg, rgba(108,59,170,0.12), rgba(166,110,255,0.18));
  }
  .dashboard-logo-placeholder svg {
    width: 52px;
    height: 52px;
    color: var(--royal-light);
  }
  /* If a real logo image is dropped in, fill the circle cleanly */
  .dashboard-logo-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
    padding: 14px;
  }

  .dashboard-name {
    font-family: 'Outfit', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-dark);
    letter-spacing: -0.01em;
  }
  .dashboard-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-mid);
    margin-top: 15px;
  }

  .dashboard-cta {
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--electric);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dashboard-cta svg {
    width: 16px;
    height: 16px;
    transform: translateX(0);
    transition: transform 0.22s ease;
  }
  .dashboard-card:hover .dashboard-cta svg {
    transform: translateX(4px);
  }

</style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<div class="header">
  <div class="header-title">Operational <span>Mobility</span> Dashboard</div>

  <div class="logo-bar">
    <!-- SLT Mobitel -->
    <img src="https://i.postimg.cc/1tB4642h/SLTMobitel-Logo-svg.png" alt="SLT Mobitel">
    <div class="logo-divider"></div>
    <!-- University crest (simplified) -->
    <img src="https://upload.wikimedia.org/wikipedia/en/6/60/University_of_Moratuwa_logo.png" alt="University of Moratuwa" style="height:52px">
    <div class="logo-divider"></div>
    <!-- DTML -->
    <img src="https://i.postimg.cc/zvgz7jGF/Artboard-1-2x-(2).png" alt="DTML">
  </div>
</div>

<!-- ══════════ CONTENT ══════════ -->
<div class="content">

  <!-- SECTION: Dashboard Selector -->
  <div class="section-label">Select Dashboard</div>
  <div class="dashboard-grid">

    <!-- SLT Dashboard -->
    <a class="dashboard-card" href="slt.html">
        <!-- Logo placeholder: replace this SVG with an <img src="your-logo.png"> when ready -->
      <img src="https://i.postimg.cc/xTXsWgBT/slt.png" alt="" style="width: 75%">

      <div>
        <div class="dashboard-name">SLT Dashboard</div>
        <div class="dashboard-sub">Sri Lanka Telecom operational insights</div>
      </div>
      <div class="dashboard-cta">
        Open Dashboard
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </a>

    <!-- Mobitel Dashboard -->
    <a class="dashboard-card" href="mobitel.html">
        <!-- Logo placeholder: replace this SVG with an <img src="your-logo.png"> when ready -->
        <img src="https://i.postimg.cc/Pqj2vHJX/mobitel.jpg" alt="" style="width: 75%">
      <div>
        <div class="dashboard-name">Mobitel Dashboard</div>
        <div class="dashboard-sub">Mobitel operational insights</div>
      </div>
      <div class="dashboard-cta">
        Open Dashboard
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </div>
    </a>

  </div><!-- /dashboard-grid -->

</div><!-- /content -->

</body>
</html>
